<section class="card">
  <h2 class="card__title">Rating</h2>

  <div class="rating-row">
    <span class="rating-row__label">Avg. rating</span>
    <span class="rating-badge">{{ averageRatingPercent }}%</span>
  </div>

  <div class="rating-row">
    <span class="rating-row__label">Rating count</span>
    <span class="rating-badge rating-badge--muted">{{ ratingCountPercent }}%</span>
  </div>
</section>
