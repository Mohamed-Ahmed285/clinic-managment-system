<section class="section">
  <div class="section-head">
    <div>
      <span class="eyebrow">Section 2</span>
      <h2>Clinics</h2>
    </div>
    <button type="button" class="btn-primary" (click)="addClinic()">
      + Add clinic
    </button>
  </div>

  <div class="clinic-list">
  <app-clinic-card
    *ngFor="let clinic of clinics; let i = index"
    [clinic]="clinic"
    [availableClinics]="availableClinics"
    (remove)="removeClinic(i)"
    (save)="saveClinic($event)">
  </app-clinic-card>
  </div>
</section>
