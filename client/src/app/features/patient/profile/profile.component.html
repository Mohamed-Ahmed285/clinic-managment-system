<div *ngIf="profileData">
<div class="bg-secondary py-8">
  <div class="container mx-auto lg:px-24 md:px-24 pt-0 py-12 px-10">
    <div
      class="flex flex-col md:flex-row md:items-center md:justify-between gap-6"
    >
      <div>
        <p class="uppercase tracking-[5px] text-gray-500 text-sm italic">
          Account
        </p>

        <h1 class="text-5xl font-semibold mt-2 italic">Your profile</h1>

        <p class="text-gray-600 mt-3 text-xl italic">
          Keep your personal, medical, and insurance details up to date.
        </p>
      </div>

     <div>
       <button
        class="bg-primary text-white px-8 py-3 rounded-2xl hover:opacity-90 transition me-2 my-2"
      >
        Save changes
      </button>
          <button class="bg-primary py-0 px-3 text-white rounded-2xl h-[50px] " routerLink="../appointments/">+Book Appointment</button>
     </div>
    </div>



    <div
      class="bg-white rounded-3xl shadow-sm border border-[#e0e9eb] mt-10 p-6 lg:p-8"
    >


      <h2 class="text-4xl font-semiboldv italic mt-2">Personal information</h2>



      <div class="grid lg:grid-cols-3 gap-8 mt-8">


        <div class="flex flex-col items-center">
          <!-- <div
            class="w-40 h-40 rounded-full bg-primary flex items-center justify-center text-white text-5xl"
          >
   <img [src]="profileData.user.profileImage" alt="Profile Image" />
          </div> -->
<div
  *ngIf="profileData?.user?.profileImage; else avatar"
  class="w-[200px] h-[200px] rounded-full overflow-hidden"
>
  <img
    [src]="profileData.user.profileImage"
    class="w-full h-full object-cover"
    alt="Profile"
  />
</div>

<ng-template #avatar>
  <div
    class="w-[200px] h-[200px] rounded-full bg-primary text-white flex items-center justify-center font-bold text-5xl"
  >
    {{ getInitials(profileData?.user?.name) }}
  </div>
</ng-template>
          <input
            #fileInput
            type="file"
            accept="image/*"
            hidden
            (change)="onImageSelected($event)"
          />

          <button
            class="border mt-5 rounded-xl px-5 py-2"
            (click)="fileInput.click()"
          >
            Upload
          </button>
        </div>



        <div class="lg:col-span-2">
          <div class="grid md:grid-cols-2 gap-5">


            <div>
              <label class="uppercase text-sm text-gray-500"> Full Name </label>

              <input
                type="text"
                class="w-full mt-2 rounded-xl border bg-[#f7fafa] p-3 border-[#e0e9eb]"
                [(ngModel)]="profileData.user.name"
              />
            </div>


            <div>
              <label class="uppercase text-sm text-gray-500"> Email </label>

              <input
                type="email"
                class="w-full mt-2 rounded-xl border bg-[#F4FBFA] p-3 border-[#e0e9eb]"
                [(ngModel)]="profileData.user.email"
              />
            </div>



            <div>
              <label class="uppercase text-sm text-gray-500">
                Phone Number
              </label>

              <input
                class="w-full mt-2 rounded-xl border bg-[#F4FBFA] p-3 border-[#e0e9eb]"
                    [(ngModel)]="profileData.user.phone"
              />
            </div>


            <div>
              <label class="uppercase text-sm text-gray-500">
                Date Of Birth
              </label>

              <input
                type="date"
                class="w-full mt-2 rounded-xl border bg-[#F4FBFA] p-3 border-[#e0e9eb]"
                    [(ngModel)]="profileData.profile.dateOfBirth"
              />
            </div>



            <div>
              <label class="uppercase text-sm text-gray-500"> Gender </label>

              <select
                class="w-full mt-2 rounded-xl border bg-[#F4FBFA] p-3 border-[#e0e9eb]"
                 [(ngModel)]="profileData.profile.gender"

              >
                <option>male</option>
                <option>female</option>
              </select>
            </div>


        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">


  <div>
    <label class="uppercase text-sm text-gray-500">City</label>

    <input
      type="text"
      placeholder="Cairo"
      class="w-full mt-2 rounded-xl border border-[#e0e9eb] bg-[#F4FBFA] p-3 outline-none focus:border-primary"
    [(ngModel)]="profileData.profile.address.city"
      />
  </div>


  <div>
    <label class="uppercase text-sm text-gray-500">State</label>

    <input
      type="text"
      placeholder="Cairo Governorate"
      class="w-full mt-2 rounded-xl border border-[#e0e9eb] bg-[#F4FBFA] p-3 outline-none focus:border-primary"
     [(ngModel)]="profileData.profile.address.state"
      />
  </div>

  <div>
    <label class="uppercase text-sm text-gray-500">Country</label>

    <input
      type="text"
      placeholder="Egypt"
      class="w-full mt-2 rounded-xl border border-[#e0e9eb] bg-[#F4FBFA] p-3 outline-none focus:border-primary"
      [(ngModel)]="profileData.profile.address.country"
      />
  </div>

</div>
<div>
  <label class="uppercase text-sm text-gray-500">
    Preferred Payment Method
  </label>

  <select
    class="w-full mt-2 rounded-xl border border-[#e0e9eb] bg-[#F4FBFA] p-3 outline-none focus:border-primary pe-2"
   [(ngModel)]="profileData.profile.preferredPaymentMethod"
    >
    <option value="">Select payment method</option>
    <option value="cash">Cash</option>
    <option value="online">Online</option>

  </select>
</div>


<div class="flex flex-col justify-end">
  <label class="uppercase text-sm text-gray-500 mb-4">
    Notifications
  </label>

  <label class="flex items-center gap-3 cursor-pointer">
    <input
      type="checkbox"
      class="w-5 h-5 accent-primary mb-3 "
      [(ngModel)]="profileData.profile.notificationsEnabled"
    />

    <span class="text-gray-700 mb-3">
      Enable notifications
    </span>
  </label>
</div>
          </div>
        </div>
      </div>
    </div>
<div class="records my-5">
  <p class="text-gray text-md font-serif my-2">Health Story</p>
<h2 class="text-4xl italic font-semibold font-serif">Medical records</h2>
<div class="bg-white rounded-3xl p-5 w-fit my-3">
  <p class="text-gray text-md font-serif my-2  ">Total Records</p>
<h2 class="text-4xl italic font-semibold font-serif">12</h2>
</div>
<div class="flex justify-between bg-white rounded-2xl p-5 flex-wrap">
<div class="flex gap-2 items-center ">
  <div class="bg-secondary rounded-2xl p-5 font-bold text-primary">
A
</div>
<div class="">
<p class="text-gray text-sm my-2">
June 14 2026
</p>
<p>
  Dr.Sakamura
</p>
</div>
</div>
<button class="button text-gray py-0 px-5 border border-gray font-semibold h-[50px] rounded-full my-3"  (click)="openPopup()">View</button>

</div>

</div>

  </div>
</div>
<div
  *ngIf="isPopupOpen"
  class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"
>
  <div class="bg-white p-6 rounded-xl shadow-lg w-[400px] relative">

    <button
      (click)="closePopup()"
      class="absolute top-3 right-3 text-xl"
    >
      ✕
    </button>

    <h2 class="text-2xl font-semibold mb-4">
      Add Appointment
    </h2>

    <input
      type="text"
      placeholder="Enter Name"
      class="w-full border rounded-lg p-2 mb-4"
    />

    <button
      class="w-full bg-[#04585c] text-white py-2 rounded-lg"
    >
      Save
    </button>

  </div>
</div>
